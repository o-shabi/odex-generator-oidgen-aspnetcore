name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Odex.AspNetCore.Generators.OidGen.sln

      - name: Build
        run: dotnet build Odex.AspNetCore.Generators.OidGen.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Odex.AspNetCore.Generators.OidGen.sln --configuration Release --no-build --verbosity normal
