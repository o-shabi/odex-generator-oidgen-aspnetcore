name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Odex.AspNetCore.Generators.OidGen.sln

      - name: Build
        run: |
          dotnet build Odex.AspNetCore.Generators.OidGen.sln \
            --configuration Release \
            --no-restore \
            -p:Version="$VERSION" \
            -p:PackageVersion="$VERSION"

      - name: Test
        run: dotnet test Odex.AspNetCore.Generators.OidGen.sln --configuration Release --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack Odex.AspNetCore.Generators.OidGen/Odex.AspNetCore.Generators.OidGen.csproj \
            --configuration Release \
            --no-build \
            -o artifacts \
            -p:PackageVersion="$VERSION" \
            -p:Version="$VERSION"

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          if compgen -G "artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push artifacts/*.snupkg \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
